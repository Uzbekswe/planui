<!DOCTYPE html>
<html lang="en" data-theme="dark" data-font="sans" data-color="blue">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}} — planui</title>
  <style>{{STYLES}}</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div id="header-brand">
    <span id="brand-logo">planui</span>
    <span id="plan-title">{{TITLE}}</span>
  </div>
  {{STATUS_BADGE}}
  <button id="theme-toggle" aria-label="Switch to light mode">
    <!-- Sun: shown in dark/midnight mode -->
    <svg class="icon-sun" aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <!-- Moon: shown in light mode -->
    <svg class="icon-moon" aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
  <a id="version-badge" href="https://github.com/Uzbekswe/planui/blob/main/CHANGELOG.md"
     target="_blank" rel="noopener">@uzbekswe/planui@{{TOOL_VERSION}}</a>
  <div style="position:relative">
    <button id="gear-btn" title="Appearance settings" aria-label="Settings">⚙</button>
    <div id="gear-menu">
      <div class="gear-row">
        <label for="gear-theme">Theme</label>
        <select id="gear-theme">
          <option value="system">System</option>
          <option value="dark">Dark</option>
          <option value="midnight">Midnight</option>
          <option value="light">Light</option>
        </select>
      </div>
      <div class="gear-row">
        <label for="gear-font">Font</label>
        <select id="gear-font">
          <option value="sans">Sans (Inter)</option>
          <option value="serif">Serif</option>
          <option value="mono">Mono</option>
        </select>
      </div>
      <div class="gear-row">
        <label for="gear-color">Accent color</label>
        <select id="gear-color">
          <option value="blue">Blue</option>
          <option value="green">Green</option>
          <option value="purple">Purple</option>
          <option value="white">White</option>
        </select>
      </div>
    </div>
  </div>
  <div id="progress-rail"><div id="progress-fill"></div></div>
</div>

<!-- Content -->
<div id="content">
  <nav id="sidebar" aria-label="Table of contents"></nav>
  <main id="main">
    {{SECTIONS_HTML}}
  </main>
</div>

<!-- Action bar -->
<div id="action-bar">
  <button id="approve-btn" class="action-btn primary">Approve plan</button>
  <button id="copy-feedback-btn" class="action-btn">Copy feedback</button>
  <button id="export-btn" class="action-btn">Export annotated</button>
  <span id="questions-warning" role="status" aria-live="polite"></span>
  <span id="bar-status"></span>
  <span id="copy-confirm">Copied!</span>
</div>

<!-- Footer -->
<div id="footer">
  <span>Rendered: {{RENDERED_AT}}</span>
  <span>Plan ID: {{PLAN_ID}}</span>
</div>

<!-- Data island -->
<script id="planui-data" type="application/json">{{PLAN_JSON}}</script>
<script>{{ACTIONS_JS}}</script>
</body>
</html>
