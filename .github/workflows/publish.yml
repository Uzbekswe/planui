name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # for gh release create
  id-token: write   # for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        run: gh release create "${{ github.ref_name }}" --generate-notes --title "${{ github.ref_name }}" || echo "Release already exists, skipping"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
